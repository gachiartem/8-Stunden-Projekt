<main class="mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="text-center py-10">
        <h2 class="text-5xl md:text-7xl font-black italic tracking-tighter text-gray-900 mb-6">
            ОБЕРІТЬ СВІЙ <br><span class="text-orange-500">PIZZA VIBE</span>
        </h2>
        <p class="text-lg text-gray-500 mb-16 max-w-lg mx-auto">
            Найкраща піца в місті за авторськими рецептами. Тисніть на категорію, щоб розпочати замовлення.
        </p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
            {% for category in categories %}
            <a href="{% url 'main:catalog' category.slug %}" 
               hx-get="{% url 'main:catalog' category.slug %}" 
               hx-target="#main-content" 
               hx-push-url="true"
               class="group block p-12 bg-white border border-gray-100 rounded-3xl shadow-sm hover:shadow-2xl hover:border-orange-500 transition-all duration-300">
                <h3 class="text-2xl font-black uppercase tracking-tight group-hover:text-orange-600 transition">
                    {{ category.name|upper }}
                </h3>
                <div class="mt-4 w-12 h-1 bg-gray-100 group-hover:bg-orange-500 mx-auto transition-colors"></div>
            </a>
            {% endfor %}
        </div>
    </div>
</main>
