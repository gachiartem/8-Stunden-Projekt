<div class="cart-summary-box">
    <div class="cart-summary-row">
        <span>Сума замовлення</span>
        <strong data-cart-subtotal>{{ cart.subtotal }} ₴</strong>
    </div>

    <div class="cart-summary-delivery">
        <span>🚚</span>
        <p>Безкоштовна доставка від 400 ₴</p>
    </div>

    <a href="{% url 'orders:checkout' %}"
        hx-get="{% url 'orders:checkout' %}"
        hx-target="#main-content"
        hx-swap="innerHTML show:window:top"
        hx-push-url="true"
        onclick="document.getElementById('cart-container').innerHTML = ''; document.body.classList.remove('modal-open');"
        class="cart-checkout-btn">
            Оформити замовлення
        </a>
</div>
